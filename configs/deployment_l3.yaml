serial:
  port: /dev/ttyUSB0
  baudrate: 115200
  timeout: 0.2

camera:
  index: 0
  width: 640
  height: 480

runtime:
  image_size: 84
  max_steps: 12
  probe_steps: 4
  log_dir: data/raw/real_eval
  primitive_sleep_s: 4.0

safety:
  max_joint_step_deg: 5.0
  cartesian_step_mm: 12.0
  reset_before_episode: true
