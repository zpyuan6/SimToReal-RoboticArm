seed: 7
paths:
  data_root: data/pseudo_real_embodiment
  results_root: results\fixed_protocol\real_eval_shiftgrid_a8g05_ff
  figures_root: figures
  checkpoint_dir: results\fixed_protocol\real_eval_shiftgrid_a8g05_ff\checkpoints
sim:
  image_size: 84
  control_dt: 0.02
  action_repeat: 5
  episode_horizon: 32
  task_context_rescaling: false
  tasks:
  - level1_verify
  - level2_approach
  - level3_pick_place
  context:
    camera_translation_jitter: 0.04
    camera_rotation_jitter: 0.08
    fov_jitter: 13.0
    light_jitter: 0.15
    blur_sigma: 0.35
    noise_std: 0.01
    action_gain_low: 0.58
    action_gain_high: 1.38
    action_delay_max: 4
    joint_bias: 0.17
data:
  train_episodes: 1200
  val_episodes: 240
  test_episodes: 360
  real_probe_episodes: 18
pseudo_real:
  calibration_episodes: 160
  heldout_episodes: 240
  source_train_path: data/processed/train.npz
model:
  backbone_type: feedforward
  image_channels: 3
  state_dim: 14
  action_dim: 11
  action_residual_dim: 6
  latent_dim: 128
  hidden_dim: 128
  context_dim: 1
  action_embed_dim: 16
  task_embed_dim: 24
  task_prior_scale: 1.65
  task_prior_negative_value: -0.25
  stage_prior_scale: 1.05
  predicted_stage_prior_scale: 0.35
  use_prev_action_context: true
  history_len: 4
  chunk_size: 2
  task_vocab_size: 3
  transition_stage_bins: 4
  stage_aux_classes: 8
  language_dim: 32
  language_action_prior_scale: 0.8
  diffusion_steps: 4
  diffusion_dim: 32
  prev_action_dropout: 0.35
  chunk_future_weight: 0.25
  chunk_temporal_agg: true
  chunk_temporal_decay: 0.35
  recurrent_use_prev_action: true
  recurrent_runtime_horizon: 8
  recurrent_sequence_final_weight: 1.0
  diffusion_logit_blend: 0.5
  adapter_hidden_dim: 64
  adapter_scale: 0.05
  residual_scale: 0.0
  latent_affine_alignment: true
  latent_affine_task_conditioned: true
  latent_affine_max_scale: 4.0
  latent_affine_blend: 1.0
train:
  batch_size: 16
  epochs: 18
  lr: 0.0005
  min_lr: 3.0e-05
  weight_decay: 0.0001
  device: cuda
  transition_loss_weight: 0.5
  use_weighted_sampler: true
  primitive_balance_power: 0.75
  stage_balance_power: 0.65
  success_sample_boost: 2.0
  level3_success_boost: 10.0
  level3_late_primitive_boost: 2.5
  level3_transport_stage_boost: 2.5
  stage_loss_weight: 0.4
  normalize_task_mass_after_boost: true
adaptation:
  lr: 0.00025
  epochs: 18
  batch_size: 6
  adapter_reg_weight: 0.06
  static_alignment_weight: 1.0
  residual_adaptive_adapt_alpha: 8.0
  residual_adaptive_adapt_gamma: 0.5
  source_primitive_alignment_weight: 0.0
  source_delta_alignment_weight: 0.0
  source_policy_alignment_weight: 0.0
  source_alignment_temperature: 1.0
  source_alignment_use_std_norm: true
few_shot:
  lr: 0.00015
  epochs: 8
  batch_size: 8
  weight_decay: 5.0e-05
  transition_loss_weight: 0.35
  stage_loss_weight: 0.2
  trainable_modules:
  - image_encoder
  - state_encoder
  - fusion
  - policy_head
  - feature_fusion
  - gru
  - post_gru
  - chunk_head
  - direct_head
  - denoiser
  - stage_head
evaluation:
  episodes_per_task: 96
  report_name: summary.csv
backbone_overrides:
  feedforward:
    model:
      task_embed_dim: 24
      use_prev_action_context: true
      task_prior_scale: 1.65
      task_prior_negative_value: -0.25
      stage_prior_scale: 1.05
      predicted_stage_prior_scale: 0.35
      adapter_scale: 0.05
    train:
      epochs: 18
      lr: 0.0005
      min_lr: 3.0e-05
      stage_loss_weight: 0.4
      level3_success_boost: 10.0
      level3_late_primitive_boost: 2.5
      level3_transport_stage_boost: 2.5
    adaptation:
      lr: 0.00025
      epochs: 18
      adapter_reg_weight: 0.06
      batch_size: 6
      source_primitive_alignment_weight: 0.0
      source_delta_alignment_weight: 0.0
      source_policy_alignment_weight: 0.0
  recurrent:
    model:
      history_len: 4
      task_embed_dim: 24
      task_prior_scale: 1.35
      task_prior_negative_value: -0.2
      prev_action_dropout: 0.08
      recurrent_use_prev_action: true
      recurrent_runtime_horizon: 4
      recurrent_sequence_final_weight: 1.6
      stage_prior_scale: 1.25
      predicted_stage_prior_scale: 0.4
    train:
      batch_size: 12
      epochs: 22
      lr: 0.0003
      min_lr: 2.0e-05
      stage_loss_weight: 0.35
      level3_success_boost: 7.0
      level3_late_primitive_boost: 2.0
      level3_transport_stage_boost: 1.8
    adaptation:
      lr: 0.00015
      epochs: 22
      adapter_reg_weight: 0.05
      batch_size: 6
  chunking:
    model:
      history_len: 6
      chunk_size: 2
      chunk_future_weight: 0.05
      chunk_temporal_agg: false
      chunk_temporal_decay: 0.35
    train:
      batch_size: 12
      epochs: 18
      lr: 0.00035
      min_lr: 2.0e-05
    adaptation:
      lr: 0.00025
      epochs: 14
      adapter_reg_weight: 0.08
  language:
    model:
      language_dim: 64
      use_prev_action_context: true
      language_action_prior_scale: 1.2
    train:
      epochs: 16
      lr: 0.0005
      min_lr: 3.0e-05
      stage_loss_weight: 0.35
      level3_success_boost: 8.0
      level3_late_primitive_boost: 2.0
      level3_transport_stage_boost: 1.8
    adaptation:
      lr: 0.00022
      epochs: 16
      adapter_reg_weight: 0.07
  diffusion:
    model:
      task_embed_dim: 24
      use_prev_action_context: true
      task_prior_scale: 1.5
      task_prior_negative_value: -0.2
      stage_prior_scale: 1.0
      predicted_stage_prior_scale: 0.3
      diffusion_loss_weight: 0.001
      diffusion_logit_blend: 0.0
    train:
      epochs: 18
      lr: 0.0005
      min_lr: 3.0e-05
      stage_loss_weight: 0.35
      level3_success_boost: 8.0
      level3_late_primitive_boost: 2.2
      level3_transport_stage_boost: 2.0
    adaptation:
      lr: 0.00012
      epochs: 20
      adapter_reg_weight: 0.14
      batch_size: 6



