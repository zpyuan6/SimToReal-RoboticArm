shared:
  config: configs/base.yaml
  deploy_config: configs/deployment_l3.yaml
  output_root: data/real_v2/transitions
  primitive_sleep_s: 2.0
  repeats: 4
  reset_between_episodes: true
  auto_start: false
  auto_accept: false
  save_preview: true
  object_name: wire_ear_cork
  dropzone_name: blue_dropzone
  scene_constraints:
    - Keep the arm mount, camera mount, table, and drop zone fixed within one collection day.
    - Keep the object identity fixed across all transition sessions in one protocol run.
    - Do not move the camera between calibration and held-out sessions.
    - Use redo immediately if an episode contains a human hand in the camera view during execution.
  video_global_expectations:
    - Every preview should alternate before and after frames for each primitive with a visible state change.
    - The target should remain visible whenever the primitive is supposed to be observation or approach oriented.
    - The camera feed should be sharp enough to resolve the target silhouette and the blue drop zone boundary.
    - Large motion blur, full-frame occlusion, or dropped frames are grounds for redo.

sessions:
  calib_l1_center:
    task: level1_verify
    split_role: calibration
    layout_tag: center_band
    notes: "Center-band placements used for short calibration transitions."
    placement_guide:
      - Place the target in the center third of the obs_center view, not touching the drop zone.
      - Vary the orientation slightly across repeats, but keep the target inside the same central placement band.
      - The target should still be recoverable from obs_left or obs_right with one follow-up obs_center action.
    acceptance_criteria:
      - After obs_center, the target should be clearly visible and near the horizontal center of the frame.
      - After verify_target, no accidental arm collision or large camera shake should be visible.
      - Redo any episode where the target leaves the frame during the observation sequence.
    video_expectations:
      - obs_left and obs_right should visibly move the target to opposite sides of the frame.
      - obs_center should bring the target back toward the center band.
      - verify_target should look like a brief stable hold rather than a second large motion.
    sequences:
      - name: left_center_confirm
        primitives: [obs_left, obs_center, verify_target]
      - name: right_center_confirm
        primitives: [obs_right, obs_center, verify_target]
      - name: center_confirm
        primitives: [obs_center, verify_target]

  calib_l2_center:
    task: level2_approach
    split_role: calibration
    layout_tag: center_band
    notes: "Center-band approach transitions; object should end near a stable pre-grasp pose."
    placement_guide:
      - Start from the same center-band placements used in L1.
      - Keep the object outside the gripper at reset; do not start in contact.
      - Use modest orientation variation only; do not rotate the ear handle away from the gripper side.
    acceptance_criteria:
      - prealign_grasp should move the arm into a coarse frontal approach posture without overshooting.
      - approach_coarse then approach_fine should make the target appear larger and more centered.
      - retreat should move the gripper visibly away from the target and restore clearance.
    video_expectations:
      - The target should occupy more image area after approach_fine than before prealign_grasp.
      - No sudden jump should place the gripper past the target after approach_fine.
      - retreat should reverse the approach visually rather than continuing forward.
    sequences:
      - name: center_approach
        primitives: [obs_center, prealign_grasp, approach_coarse, approach_fine, retreat]
      - name: left_to_approach
        primitives: [obs_left, obs_center, prealign_grasp, approach_coarse, approach_fine, retreat]
      - name: right_to_approach
        primitives: [obs_right, obs_center, prealign_grasp, approach_coarse, approach_fine, retreat]

  calib_l3_center:
    task: level3_pick_place
    split_role: calibration
    layout_tag: center_band
    notes: "Center-band full pick-place transitions for adapter calibration."
    placement_guide:
      - Start from the same center-band placements as L2.
      - Keep the blue drop zone fixed and unobstructed on the right-side destination area.
      - Keep the object far enough from the drop zone that transport_to_dropzone produces visible motion.
    acceptance_criteria:
      - pregrasp_servo should lower toward a near-target pre-grasp pose without contacting the object too early.
      - grasp_execute should close around the ear handle region rather than closing in free space.
      - lift_object should visibly raise the object; place_object should visibly open the gripper over the drop zone.
    video_expectations:
      - grasp_execute should be followed by reduced gripper opening in the after-frame.
      - lift_object should increase vertical separation between object and table.
      - transport_to_dropzone and place_object should move the object into the blue zone region.
    sequences:
      - name: center_pick_place
        primitives: [obs_center, pregrasp_servo, grasp_execute, lift_object, transport_to_dropzone, place_object, retreat]
      - name: reobserve_pick_place
        primitives: [reobserve, pregrasp_servo, grasp_execute, lift_object, transport_to_dropzone, place_object, retreat]

  heldout_l1_offset:
    task: level1_verify
    split_role: heldout
    layout_tag: front_left_front_right
    notes: "Held-out placements with left/right offset not used during calibration."
    placement_guide:
      - Use placements outside the center band: one object-width left, one object-width right, or one object-length toward the arm.
      - Do not reuse the exact calibration placements in the same session block.
      - Keep the target fully inside the reachable observation field.
    acceptance_criteria:
      - The target should require a meaningful observation correction before verify_target.
      - obs_center should still be able to recover a near-centered view in one step.
    video_expectations:
      - The before/after difference between obs_left or obs_right and obs_center should be larger than in calibration clips.
    sequences:
      - name: left_center_confirm
        primitives: [obs_left, obs_center, verify_target]
      - name: right_center_confirm
        primitives: [obs_right, obs_center, verify_target]
      - name: center_confirm
        primitives: [obs_center, verify_target]

  heldout_l2_offset:
    task: level2_approach
    split_role: heldout
    layout_tag: front_left_front_right
    notes: "Held-out approach transitions with visibly different target offsets."
    placement_guide:
      - Use the same left/right/front offset family as heldout L1.
      - Ensure the target is still reachable by the approach chain without manual intervention.
      - Alternate left, right, and front-biased placements across repeats.
    acceptance_criteria:
      - approach_coarse and approach_fine should still reduce apparent target distance from the gripper.
      - retreat should return the gripper to a visibly safer clearance state.
    video_expectations:
      - Held-out approach clips should look harder than center-band clips but still physically executable.
    sequences:
      - name: center_approach
        primitives: [obs_center, prealign_grasp, approach_coarse, approach_fine, retreat]
      - name: left_to_approach
        primitives: [obs_left, obs_center, prealign_grasp, approach_coarse, approach_fine, retreat]
      - name: right_to_approach
        primitives: [obs_right, obs_center, prealign_grasp, approach_coarse, approach_fine, retreat]

  heldout_l3_offset:
    task: level3_pick_place
    split_role: heldout
    layout_tag: front_left_front_right
    notes: "Held-out full pick-place transitions; use distinct placements from calibration days."
    placement_guide:
      - Use front/left/right-biased placements that were not used in calibration L3 sessions.
      - Keep the drop zone fixed; only vary the object start pose.
      - Prefer offsets that still allow successful pick-place without changing primitive scripts.
    acceptance_criteria:
      - The full chain should remain physically plausible; redo any episode with obvious missed grasp or collision.
      - place_object should still occur above the blue zone, not over empty table elsewhere.
    video_expectations:
      - The object trajectory should visibly start from a different initial part of the workspace than in calibration L3.
      - The full clip should still show the object being lifted, transported, and released into the destination region.
    sequences:
      - name: center_pick_place
        primitives: [obs_center, pregrasp_servo, grasp_execute, lift_object, transport_to_dropzone, place_object, retreat]
      - name: reobserve_pick_place
        primitives: [reobserve, pregrasp_servo, grasp_execute, lift_object, transport_to_dropzone, place_object, retreat]
