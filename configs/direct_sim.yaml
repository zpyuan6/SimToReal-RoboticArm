seed: 11

paths:
  data_root: data/processed_direct
  results_root: results/direct_sim
  figures_root: figures
  checkpoint_dir: results/direct_sim/checkpoints

sim:
  image_size: 84
  control_dt: 0.02
  action_repeat: 5
  episode_horizon: 24
  tasks:
    - approach
    - verify
    - observe_then_act
  context:
    camera_jitter: 0.0
    fov_jitter: 0.0
    light_jitter: 0.0
    texture_jitter: 0.0
    blur_sigma: 0.0
    noise_std: 0.0
    action_gain_low: 1.0
    action_gain_high: 1.0
    action_delay_max: 0
    joint_bias: 0.0

data:
  train_episodes: 240
  val_episodes: 60
  test_episodes: 90
  real_probe_episodes: 18

model:
  image_channels: 3
  state_dim: 19
  action_dim: 7
  latent_dim: 64
  context_dim: 8
  hidden_dim: 128

train:
  batch_size: 16
  epochs: 12
  lr: 0.001
  weight_decay: 0.0001
  device: cpu
  policy_loss_weight: 1.0
  transition_loss_weight: 1.0
  temporal_loss_weight: 0.2
  context_smooth_weight: 0.05
  context_penalty_weight: 0.01

adaptation:
  lr: 0.03
  steps_per_update: 3
  probe_steps: 4
  temporal_weight: 0.2
  transition_weight: 1.0
  context_penalty_weight: 0.02

evaluation:
  episodes_per_task: 24
  report_name: summary.csv
