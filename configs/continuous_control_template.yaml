base_config: base.yaml

control:
  enabled: true
  backbone_name: act
  family: continuous_control
  image_shape: [224, 224, 3]
  proprio_dim: 14
  uses_language: false
  latent_adapter_target: transformer_chunk_latent
  official:
    provider: lerobot
    policy_type: act
    policy_path:
    enforce_official_training: true
    config_overrides: {}
  action:
    control_mode: joint_delta
    action_dim: 6
    horizon: 8
    clamp_low: [-0.25, -0.25, -0.25, -0.25, -0.25, -0.25]
    clamp_high: [0.25, 0.25, 0.25, 0.25, 0.25, 0.25]

data_continuous:
  train_path: data/continuous/train.npz
  val_path: data/continuous/val.npz
  test_path: data/continuous/test.npz
  history_len: 2
  action_horizon: 8
  task_text_enabled: false

train_continuous:
  batch_size: 16
  epochs: 20
  lr: 0.0001
  weight_decay: 0.0001
  device: cuda
  use_adapter: false
  adapter_lr: 0.00005

official_train:
  dataset:
    repo_id: roarm_continuous_train
    root: data/lerobot/roarm_continuous_train
  batch_size: 8
  steps: 100000
  output_dir: outputs/train/lerobot
  job_name: roarm_official_backbone
  policy_device: cuda
  wandb_enable: false
