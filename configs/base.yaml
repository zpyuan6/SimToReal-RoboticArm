seed: 7

paths:
  data_root: data/processed
  results_root: results
  figures_root: figures
  checkpoint_dir: results/checkpoints

sim:
  primitive_vocabulary: legacy
  image_size: 224
  control_dt: 0.02
  action_repeat: 5
  episode_horizon: 32
  task_context_rescaling: false
  tasks:
    - level1_verify
    - level2_approach
    - level3_pick_place
  context:
    camera_translation_jitter: 0.015
    camera_rotation_jitter: 0.03
    fov_jitter: 6.0
    light_jitter: 0.35
    blur_sigma: 1.0
    noise_std: 0.03
    action_gain_low: 0.78
    action_gain_high: 1.18
    action_delay_max: 2
    joint_bias: 0.09

data:
  train_episodes: 1200
  val_episodes: 240
  test_episodes: 360
  real_probe_episodes: 18

model:
  primitive_vocabulary: legacy
  backbone_type: feedforward
  image_channels: 3
  state_dim: 18
  action_dim: 16
  action_residual_dim: 6
  latent_dim: 128
  hidden_dim: 128
  context_dim: 1
  action_embed_dim: 16
  task_embed_dim: 16
  task_prior_scale: 1.2
  stage_prior_scale: 0.8
  predicted_stage_prior_scale: 0.6
  use_prev_action_context: true
  history_len: 4
  chunk_size: 2
  task_vocab_size: 3
  transition_stage_bins: 4
  stage_aux_classes: 8
  language_dim: 32
  diffusion_steps: 4
  diffusion_dim: 32
  prev_action_dropout: 0.35
  chunk_future_weight: 0.1
  chunk_temporal_agg: false
  chunk_temporal_decay: 0.35
  recurrent_use_prev_action: true
  recurrent_runtime_horizon: 6
  recurrent_sequence_final_weight: 2.0
  adapter_hidden_dim: 64
  adapter_scale: 0.1
  adapter_phase_split: false
  residual_scale: 0.0
  latent_affine_alignment: false
  latent_affine_task_conditioned: true
  latent_affine_max_scale: 4.0
  latent_affine_blend: 1.0
  transition_action_adapter: false
  transition_action_adapter_scale: 1.0
  transition_residual_adapter: false
  transition_residual_hidden_dim: 64
  transition_residual_scale: 0.1
  transition_residual_phase_split: false
  transition_residual_observation_scale: 1.0
  transition_residual_non_observation_scale: 1.0
  policy_residual_adapter: false
  policy_residual_hidden_dim: 64
  policy_residual_scale: 0.1

train:
  batch_size: 16
  epochs: 8
  lr: 0.001
  min_lr: 0.00005
  weight_decay: 0.0001
  device: cpu
  transition_loss_weight: 0.5
  inverse_loss_weight: 0.0
  use_weighted_sampler: true
  primitive_balance_power: 0.75
  stage_balance_power: 0.65
  success_sample_boost: 2.0
  level3_success_boost: 6.0
  level3_late_primitive_boost: 2.0
  level3_transport_stage_boost: 1.5
  stage_loss_weight: 0.25
  normalize_task_mass_after_boost: true

adaptation:
  lr: 0.0005
  epochs: 8
  batch_size: 8
  adapter_reg_weight: 0.1
  auto_stage_scaling: false
  auto_stage_scale_min: 0.2
  auto_stage_scale_max: 1.0
  auto_stage_scale_power: 1.0
  auto_non_observation_scaling: false
  auto_non_observation_scale_min: 0.2
  auto_non_observation_scale_max: 1.0
  auto_non_observation_global_threshold: 0.4
  auto_non_observation_global_slope: 25.0
  auto_latent_affine_scaling: false
  auto_latent_affine_blend_min: 0.0
  auto_latent_affine_blend_max: 1.0
  auto_latent_affine_global_threshold: 0.4
  auto_latent_affine_global_slope: 25.0
  source_primitive_alignment_weight: 0.0
  source_delta_alignment_weight: 0.0
  source_policy_alignment_weight: 0.0
  source_anchor_observation_scale: 1.0
  source_anchor_non_observation_scale: 1.0
  auto_source_anchor_observation_scale: false
  auto_source_anchor_non_observation_balance: false
  auto_source_anchor_balance_min: 0.0
  auto_source_anchor_balance_max: 1.0
  auto_source_anchor_balance_threshold: 0.55
  auto_source_anchor_balance_slope: 12.0
  auto_source_anchor_scaling: false
  auto_source_anchor_scale_min: 0.0
  auto_source_anchor_scale_max: 1.0
  auto_source_anchor_global_threshold: 0.4
  auto_source_anchor_global_slope: 25.0
  source_local_prototypes_per_primitive: 1
  source_local_prototype_iters: 12
  source_alignment_temperature: 1.0
  source_alignment_use_std_norm: true
  transition_adapter_identity_weight: 0.0
  policy_adapter_identity_weight: 0.0
  policy_supervision_weight: 0.0
  inverse_supervision_weight: 0.0
  policy_preservation_weight: 0.0
  policy_preservation_alpha: 8.0
  policy_preservation_temperature: 1.0
  policy_preservation_mode: full
  policy_preservation_global_gate: false
  policy_preservation_global_threshold: 0.22
  policy_preservation_global_slope: 30.0
  policy_preservation_stage_max:
  policy_preservation_observation_only: false
  policy_preservation_observation_scale: 1.0
  policy_preservation_non_observation_scale: 1.0

evaluation:
  episodes_per_task: 96
  report_name: summary.csv
